# ──────────────────────────────────────────────────────────────────────────────
# CI — runs on every push to main and every pull request.
#
# Three jobs run in parallel:
#   build  — gating. Fails the workflow. This is what keeps prod healthy.
#   test   — non-gating today (10 of 94 pre-existing failures, see Task #51 etc).
#            Promote to gating once the harness is fully green. Tracked in
#            CONTRIBUTING.md under "CI ratcheting plan."
#   lint   — non-gating today (128 pre-existing errors, mostly unused imports
#            and `any` usages from the Build 2 wrappers). Promote to gating
#            once cleanup is complete.
#
# Why "build" is the only gate today:
#   Vercel runs the same `next build` on every deploy and we've shipped
#   green deployments today. Anything that fails this build would also fail
#   Vercel — and we know that contract holds. Tests + lint are noisy because
#   of pre-existing debt, so blocking PRs on them right now would block ALL
#   PRs. Better to surface them in CI logs and ratchet them to gating as
#   the debt clears (B / C work).
#
# Pinning:
#   Node 20 to match Vercel's documented production runtime (24.x is set in
#   Vercel project settings but its npm pkg compatibility lags behind so 20
#   is the safer CI target — same Next.js version, same TypeScript output).
#
# Caching:
#   actions/setup-node@v4 with `cache: npm` reuses node_modules across runs,
#   cutting CI from ~3min to ~45s after first warm-up.
# ──────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a newer commit lands on the same branch.
# Saves CI minutes; latest commit's result is the one that matters.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build (gating)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        # next build runs through Sentry instrumentation. SENTRY_AUTH_TOKEN is
        # optional in CI — Sentry plugin gracefully skips source-map upload
        # when absent (see next.config.mjs).
        #
        # Several SDKs (Stripe, Supabase) initialize at module-load time and
        # throw if their env vars are missing. Next.js's "Collecting page
        # data" phase runs that init code, so the build needs SOMETHING for
        # those vars even though no real API call happens in CI. We use
        # placeholder strings that pass shape validation but would fail any
        # actual API call (and CI doesn't make any). Real secrets are
        # injected by Vercel at production build time, not here.
        run: npm run build
        env:
          # Public-by-design vars (would be in NEXT_PUBLIC_* runtime config)
          NEXT_PUBLIC_SUPABASE_URL: 'https://placeholder.supabase.co'
          NEXT_PUBLIC_SUPABASE_ANON_KEY: 'eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.placeholder.placeholder'
          NEXT_PUBLIC_APP_URL: 'https://placeholder.omriapp.com'
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: 'pk_test_placeholder'
          NEXT_PUBLIC_STRIPE_STARTER_PRICE_ID: 'price_placeholder_starter'
          NEXT_PUBLIC_STRIPE_GROWTH_PRICE_ID: 'price_placeholder_growth'
          NEXT_PUBLIC_STRIPE_PRO_PRICE_ID: 'price_placeholder_pro'
          # Server-side secrets that initialize at module-load
          SUPABASE_SERVICE_ROLE_KEY: 'eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.placeholder.placeholder'
          STRIPE_SECRET_KEY: 'sk_test_placeholder_for_ci_build_only'
          STRIPE_WEBHOOK_SECRET: 'whsec_placeholder_for_ci_build_only'
          RETELL_API_KEY: 'placeholder_retell_key_for_ci'
          RETELL_WEBHOOK_SECRET: 'placeholder_retell_webhook_secret_for_ci'
          TWILIO_ACCOUNT_SID: 'ACplaceholderplaceholderplaceholder'
          TWILIO_AUTH_TOKEN: 'placeholder_twilio_auth_token_for_ci'
          RESEND_API_KEY: 're_placeholder_for_ci'
          GOOGLE_PLACES_API_KEY: 'placeholder_google_places_for_ci'
          CRON_SECRET: 'placeholder_cron_secret_for_ci'
          UPSTASH_REDIS_REST_URL: 'https://placeholder.upstash.io'
          UPSTASH_REDIS_REST_TOKEN: 'placeholder_upstash_token_for_ci'
          FOUNDER_ALERT_PHONE: '+10000000000'
          FOUNDER_ALERT_EMAIL: 'ci-placeholder@example.com'
          DEMO_BOOKING_URL: 'https://example.com/placeholder'

  test:
    name: test (non-gating until harness green)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Don't fail the workflow if tests fail — see header comment.
    # Status appears in the PR checks list as a reminder.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --ci --silent

  lint:
    name: lint (non-gating until cleanup complete)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
